    <script>
      // Restore URL after GitHub Pages 404 redirect.
      // 404.html encodes the original path as ?p=... and redirects here.
      // We restore the real URL using history.replaceState before React loads.
      (function () {
        var p = new URLSearchParams(window.location.search).get("p");
        if (p) {
          history.replaceState(null, "", decodeURIComponent(p));
        }
      })();
    </script>
